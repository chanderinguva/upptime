owner: chanderinguva
repo: upptime

sites:
  - name: Airflow
    url: https://airflow.inguva.dev
  - name: Okta Login
    url: https://login.inguva.dev
  - name: Blog
    url: https://blog.inguva.dev
    expectedStatusCodes:
      - 200
      - 301
      - 302
      - 303
  - name: Jira
    url: https://inguva-dev.atlassian.net
    expectedStatusCodes:
      - 200
      - 301
      - 302
      - 303
  - name: SCIM Server
    url: https://airflow.inguva.dev/scim/health
  - name: API Gateway
    url: https://api.inguva.dev/health

assignees:
  - chanderinguva

status-website:
  cname: status.inguva.dev
  name: Inguva Dev Status
  description: Real-time status of all inguva.dev services
  theme: dark
  navbar:
    - title: Blog
      href: https://blog.inguva.dev
    - title: Airflow
      href: https://airflow.inguva.dev

notifications:
  - type: slack
    webhook: ${{ secrets.SLACK_WEBHOOK }}
